version: '3.8'

services:
  api:
    build: .
    ports:
      - "5001:80"
    depends_on:
      - sql
      - mongo
    environment:
      - ConnectionStrings__Sql=Server=sql;Database=IMS;User=sa;Password=Your_password123;TrustServerCertificate=True
      - Mongo__Connection=mongodb://mongo:27017

  sql:
    image: mcr.microsoft.com/mssql/server
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  mongo:
    image: mongo
    ports:
      - "27017:27017"